<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function () {
              return originalFetch;
            },
            set: function (newFetch) {
              originalFetch = newFetch;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Unable to patch window.fetch getter/setter:', e);
        }
      })();
    </script>
    <title>CLASS GALLERY-PARIS • Art Gallery Pont-Neuf</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
